      flex-wrap: wrap;

      border-top: 1px solid var(--line);

    .mark.complete { background: var(--felt); }
    .mark.pairs { background: var(--violet); }
    .mark.wild { background: var(--gold); }

    .question {
      margin: 2px 0 14px;
      font-size: clamp(18px, 4.5vw, 23px);
      line-height: 1.5;
      font-weight: 600;
    }

    .choices {

    .reveal {

      color: #f7f3df;
      background: var(--felt);
      border-color: var(--felt);

      .tile .name { display: none; }
      .choices { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile { transition: none; }
    }
  </style>

      {

        recommendation:'жҺЁиҚҗпјҡе…Ҳжү“ж— еҜ№еҚ•еӯ—',
        reason:'дҝқз•ҷ456зӯ’иҝҷдёӘе®ҢжҲҗйқўеӯҗгҖӮеҚ•еј еӯ—зүҢиҰҒжҠҳд»·пјҢдёҚиғҪжҠҠ5еј еҚ•еӯ—еҪ“жҲҗ5еј зЁіе®ҡз»“жһ„пјӣзүҢйқўдҝЎжҒҜзӣёеҗҢж—¶пјҢеҚ—д»…дҪңдёәд»»дёҖж— еҜ№еҚ•еӯ—зҡ„д»ЈиЎЁгҖӮ',
        reversal:'еӯ—зүҢеҪўжҲҗдёӨеҜ№д»ҘдёҠпјҢжҲ–е·Із»Ҹзў°еҮәдёҮеӯҗ/еӯ—зүҢе№¶жҺҘиҝ‘ж··дёҖиүІзў°зў°иғЎгҖӮ'
      },
      {
        number:'жЎҲдҫӢ 02 В· зў°зүҢеҲҶеҸү', title:'4еҜ№еҠ зәўдёӯпјҢеҲ«дәәжү“еҮәдёң', status:'з»ҸйӘҢжҖ§еҲқзүҲ',
        situation:'дёӯзӣҳеүҚж®ө В· е°ҡжңӘзў°зүҢ В· еҜ№жүӢжү“еҮәдёң',

        breakAfter:7, incoming:['E','pairs'], legend:[['pairs','4дёӘеҜ№еӯҗ'],['wild','зәўдёӯ'],['weak','ж•Јеј ']],
        question:'зҺ°еңЁиғҪзў°дёңпјҢжҳҜеҗҰеә”иҜҘзў°пјҹ', choices:['зў°пјҢиҪ¬зў°зў°иғЎ','дёҚзў°пјҢдҝқз•ҷдёғеҜ№','зў°еҗҺеҶҚзңӢ','еҸӘзңӢдёңеү©дҪҷеј ж•°'],

        reason:'4еҜ№еҠ 1зәўдёӯе·ІжҳҜејәдёғеҜ№еҖҷйҖүпјҢзәўдёӯиҝҳиғҪиЎҘеҜ№жҲ–еҪўжҲҗиұӘеҚҺз§ҚеӯҗгҖӮзў°зүҢдјҡз«ӢеҚіе…ій—ӯдёғе°ҸеҜ№и·ҜзәҝгҖӮ',
        reversal:'зў°еҗҺзӣҙжҺҘеҗ¬зүҢпјҢжҲ–еҪўжҲҗжҳҺзЎ®зҡ„ж··дёҖиүІзў°зў°иғЎиҝ‘еҗ¬пјҢиҖҢдёғеҜ№еү©дҪҷж•Јеј иҙЁйҮҸеҫҲе·®гҖӮ'

      {

        tiles:[['1m','pairs'],['1m','pairs'],['3m','pairs'],['3m','pairs'],['5p','pairs'],['5p','pairs'],['7p','pairs'],['7p','pairs'],['2s','pairs'],['2s','pairs'],['9s','pairs'],['9s','pairs'],['B','target']],

        answer:0, recommendedTiles:[12], recommendation:'зӯ”жЎҲпјҡеҸҜд»ҘзӮ№зӮ®иғЎ',
        reason:'дёғе°ҸеҜ№еҸӘиҰҒжІЎжңүдҪҝз”ЁзәўдёӯдҪңиө–еӯҗпјҢе°ұдҝқз•ҷзӮ№зӮ®иө„ж јпјӣдёғе°ҸеҜ№д»Қз„¶дёҚиғҪзў°гҖҒдёҚиғҪжқ гҖӮ',

    let current = 0;
    let revealed = false;

    const $ = (id) => document.getElementById(id);

    function makeTile(code, group, recommended = false) {
      const [symbol, name] = tileMap[code];
      const tile = document.createElement('div');
      tile.className = `tile${recommended ? ' recommended' : ''}`;
      tile.dataset.group = group;
      tile.setAttribute('aria-label', name);
      tile.innerHTML = `<span class="symbol" aria-hidden="true">${symbol}</span><span class="name">${name}</span>`;
      return tile;
    }

    function render() {
      const data = cases[current];
      $('progress').textContent = `${current + 1} / ${cases.length}`;
      $('number').textContent = data.number;
      $('title').textContent = data.title;
      $('status').textContent = data.status;
      $('situation').textContent = data.situation;
      $('question').textContent = data.question;

      $('hand').replaceChildren();
      data.tiles.forEach(([code, group], index) => {
        $('hand').appendChild(makeTile(code, group, revealed && data.recommendedTiles.includes(index)));
        if (index === data.breakAfter) {
          const lineBreak = document.createElement('span');
          lineBreak.className = 'tile-break';
          lineBreak.setAttribute('aria-hidden', 'true');
          $('hand').appendChild(lineBreak);
        }
      });

      $('incoming').hidden = !data.incoming;
      $('incoming-tile').replaceChildren();
      if (data.incoming) {
        $('incoming-tile').appendChild(makeTile(data.incoming[0], data.incoming[1], revealed && data.highlightIncoming));
      }

      $('legend').replaceChildren();
      data.legend.forEach(([group, label]) => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="mark ${group}" aria-hidden="true"></span>${label}`;
        $('legend').appendChild(item);
      });

      $('choices').replaceChildren();
      data.choices.forEach((choice, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'choice';
        button.textContent = `${String.fromCharCode(65 + index)} ${choice}`;
        button.setAttribute('aria-pressed', 'false');
        button.addEventListener('click', () => {
          document.querySelectorAll('.choice').forEach((peer) => {
            const selected = peer === button;
            peer.classList.toggle('selected', selected);
            peer.setAttribute('aria-pressed', String(selected));
          });
        });
        $('choices').appendChild(button);
      });

      $('explanation').hidden = !revealed;
      $('recommendation').textContent = data.recommendation;
      $('reason').textContent = data.reason;
      $('reversal').textContent = data.reversal;
      $('reveal').textContent = revealed ? 'ж”¶иө·и§Јжһҗ' : 'жҹҘзңӢи§Јжһҗ';
      $('prev').disabled = current === 0;
      $('next').disabled = current === cases.length - 1;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    $('prev').addEventListener('click', () => {
      if (current > 0) { current -= 1; revealed = false; render(); }
    });

    $('next').addEventListener('click', () => {
      if (current < cases.length - 1) { current += 1; revealed = false; render(); }
    });

    $('reveal').addEventListener('click', () => { revealed = !revealed; render(); });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    render();
  </script>
</body>
</html>
