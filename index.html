<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="红中麻将攻略">
  <meta name="description" content="红中赖子麻将高期望收益攻略案例训练测试版">
  <link rel="manifest" href="manifest.webmanifest">
  <title>红中赖子麻将案例训练</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17352e;
      --muted: #66756f;
      --paper: #f5f1df;
      --surface: #fffdf5;
      --felt: #173f35;
      --felt-soft: #dce9df;
      --line: #cfd8d1;
      --gold: #bd8b3c;
      --rose: #a44841;
      --blue: #447a88;
      --violet: #6f628d;
      --shadow: rgba(23, 53, 46, 0.14);
    }

    * { box-sizing: border-box; }

    html { background: var(--felt); }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Songti SC", "Noto Serif SC", "STSong", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 5%, rgba(255,255,255,.08), transparent 26rem),
        linear-gradient(160deg, #173f35 0%, #102f28 100%);
    }

    button { font: inherit; }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 14px max(28px, env(safe-area-inset-bottom));
    }

    .masthead {
      color: #f7f3df;
      padding: 10px 4px 22px;
    }

    .masthead small {
      display: block;
      color: rgba(247, 243, 223, .72);
      letter-spacing: .14em;
      margin-bottom: 7px;
    }

    .masthead h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 38px);
      font-weight: 600;
      letter-spacing: .02em;
    }

    .masthead p {
      margin: 8px 0 0;
      color: rgba(247, 243, 223, .76);
      font-family: "PingFang SC", sans-serif;
      font-size: 14px;
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .nav button,
    .choice,
    .reveal {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .nav button {
      color: #f7f3df;
      background: rgba(255,255,255,.08);
    }

    .nav button:first-child { justify-self: start; padding: 0 16px; }
    .nav button:last-child { justify-self: end; padding: 0 16px; }
    .nav button:disabled { opacity: .34; cursor: default; }

    .progress {
      color: #f7f3df;
      font-family: "PingFang SC", sans-serif;
      font-size: 13px;
      letter-spacing: .08em;
    }

    .case-card {
      padding: clamp(18px, 4vw, 30px);
      background:
        linear-gradient(rgba(255,255,255,.48), rgba(255,255,255,.48)),
        repeating-linear-gradient(0deg, transparent 0 26px, rgba(23,63,53,.025) 27px);
      background-color: var(--paper);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 22px;
      box-shadow: 0 22px 50px rgba(0,0,0,.2);
    }

    .case-meta {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .number,
    .situation,
    .legend,
    .reversal {
      font-family: "PingFang SC", sans-serif;
      color: var(--muted);
    }

    .number { font-size: 13px; letter-spacing: .08em; }

    h2 {
      margin: 5px 0 0;
      font-size: clamp(22px, 5vw, 31px);
      line-height: 1.25;
      font-weight: 600;
    }

    .badge {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--felt);
      background: var(--felt-soft);
      font-family: "PingFang SC", sans-serif;
      font-size: 12px;
    }

    .situation {
      margin-top: 13px;
      padding-bottom: 13px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .hand-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 26px 0 18px;
    }

    .hand {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tile-break { flex-basis: 100%; height: 4px; }

    .tile {
      width: 43px;
      height: 63px;
      display: grid;
      place-items: center;
      align-content: center;
      position: relative;
      background: var(--surface);
      border: 1px solid #b9c3bc;
      border-bottom: 5px solid var(--line);
      border-radius: 7px;
      box-shadow: 0 4px 8px var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .tile .symbol {
      font-family: "Apple Symbols", "Noto Sans Symbols 2", sans-serif;
      font-size: 31px;
      line-height: 1;
    }

    .tile .name {
      margin-top: 1px;
      color: var(--muted);
      font-family: "PingFang SC", sans-serif;
      font-size: 9px;
    }

    .tile[data-group="target"] { border-bottom-color: var(--blue); }
    .tile[data-group="weak"] { border-bottom-color: var(--rose); }
    .tile[data-group="complete"] { border-bottom-color: var(--felt); }
    .tile[data-group="pairs"] { border-bottom-color: var(--violet); }
    .tile[data-group="wild"] { border-bottom-color: var(--gold); }
    .tile[data-group="danger"] { border-bottom-color: var(--rose); }
    .tile[data-group="safe"] { border-bottom-color: var(--gold); }

    .tile.recommended {
      transform: translateY(-10px);
      box-shadow: 0 0 0 3px rgba(23,63,53,.34), 0 7px 12px var(--shadow);
    }

    .incoming {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .incoming[hidden] { display: none; }
    .plus { color: var(--muted); font-size: 24px; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 12px 0 17px;
      border-top: 1px solid var(--line);
      font-size: 12px;
    }

    .legend-item { display: inline-flex; align-items: center; gap: 6px; }

    .mark { width: 20px; height: 4px; border-radius: 5px; }
    .mark.target { background: var(--blue); }
    .mark.weak { background: var(--rose); }
    .mark.complete { background: var(--felt); }
    .mark.pairs { background: var(--violet); }
    .mark.wild { background: var(--gold); }
    .mark.danger { background: var(--rose); }
    .mark.safe { background: var(--gold); }

    .question {
      margin: 2px 0 14px;
      font-size: clamp(18px, 4.5vw, 23px);
      line-height: 1.5;
      font-weight: 600;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .choice {
      padding: 10px 12px;
      color: var(--ink);
      background: rgba(255,255,255,.58);
      border-color: var(--line);
      font-family: "PingFang SC", sans-serif;
    }

    .choice.selected {
      color: #f7f3df;
      background: var(--felt);
      border-color: var(--felt);
    }

    .explanation {
      margin-top: 18px;
      padding: 16px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      line-height: 1.7;
    }

    .explanation[hidden] { display: none; }
    .recommendation { margin-bottom: 9px; font-weight: 600; }
    .reversal { margin-top: 9px; font-size: 13px; }

    .reveal {
      width: 100%;
      margin-top: 18px;
      color: #f7f3df;
      background: var(--felt);
      border-color: var(--felt);
      font-family: "PingFang SC", sans-serif;
      font-weight: 600;
    }

    footer {
      padding: 18px 4px 0;
      color: rgba(247,243,223,.62);
      text-align: center;
      font-family: "PingFang SC", sans-serif;
      font-size: 12px;
    }

    @media (max-width: 520px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .case-card { border-radius: 18px; }
      .hand-zone, .hand { justify-content: flex-start; }
      .tile { width: 39px; height: 58px; }
      .tile .symbol { font-size: 28px; }
    }

    @media (max-width: 380px) {
      .tile { width: 35px; height: 53px; }
      .tile .symbol { font-size: 25px; }
    }

    @media (max-width: 340px) {
      .hand { gap: 3px; }
      .tile { width: 31px; height: 48px; }
      .tile .symbol { font-size: 22px; }
      .tile .name { display: none; }
      .choices { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .tile { transition: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="masthead">
      <small>RED CENTER MAHJONG</small>
      <h1>红中赖子麻将案例训练</h1>
      <p>高期望收益攻略 · 案例训练版 v0.6</p>
    </header>

    <nav class="nav" aria-label="案例导航">
      <button type="button" id="prev">‹ 上一题</button>
      <span class="progress" id="progress"></span>
      <button type="button" id="next">下一题 ›</button>
    </nav>

    <article class="case-card" aria-live="polite">
      <div class="case-meta">
        <div>
          <div class="number" id="number"></div>
          <h2 id="title"></h2>
        </div>
        <span class="badge" id="status"></span>
      </div>

      <div class="situation" id="situation"></div>

      <div class="hand-zone">
        <div class="hand" id="hand" aria-label="当前手牌"></div>
        <div class="incoming" id="incoming" hidden>
          <span class="plus" aria-hidden="true">＋</span>
          <div id="incoming-tile"></div>
        </div>
      </div>

      <div class="legend" id="legend" aria-label="牌面结构说明"></div>
      <div class="question" id="question"></div>
      <div class="choices" id="choices"></div>

      <section class="explanation" id="explanation" hidden>
        <div class="recommendation" id="recommendation"></div>
        <div id="reason"></div>
        <div class="reversal"><strong>结论反转：</strong><span id="reversal"></span></div>
      </section>

      <button class="reveal" type="button" id="reveal">查看解析</button>
    </article>

    <footer>当前包含18个案例 · 模拟支持只适用于对应牌面与边界</footer>
  </main>

    let current = 0;
    let revealed = false;

    const $ = (id) => document.getElementById(id);

    function makeTile(code, group, recommended = false) {
      const [symbol, name] = tileMap[code];
      const tile = document.createElement('div');
      tile.className = `tile${recommended ? ' recommended' : ''}`;
      tile.dataset.group = group;
      tile.setAttribute('aria-label', name);
      tile.innerHTML = `<span class="symbol" aria-hidden="true">${symbol}</span><span class="name">${name}</span>`;
      return tile;
    }

    function render() {
      const data = cases[current];
      $('progress').textContent = `${current + 1} / ${cases.length}`;
      $('number').textContent = data.number;
      $('title').textContent = data.title;
      $('status').textContent = data.status;
      $('situation').textContent = data.situation;
      $('question').textContent = data.question;

      $('hand').replaceChildren();
      data.tiles.forEach(([code, group], index) => {
        $('hand').appendChild(makeTile(code, group, revealed && data.recommendedTiles.includes(index)));
        if (index === data.breakAfter) {
          const lineBreak = document.createElement('span');
          lineBreak.className = 'tile-break';
          lineBreak.setAttribute('aria-hidden', 'true');
          $('hand').appendChild(lineBreak);
        }
      });

      $('incoming').hidden = !data.incoming;
      $('incoming-tile').replaceChildren();
      if (data.incoming) {
        $('incoming-tile').appendChild(makeTile(data.incoming[0], data.incoming[1], revealed && data.highlightIncoming));
      }

      $('legend').replaceChildren();
      data.legend.forEach(([group, label]) => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        item.innerHTML = `<span class="mark ${group}" aria-hidden="true"></span>${label}`;
        $('legend').appendChild(item);
      });

      $('choices').replaceChildren();
      data.choices.forEach((choice, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'choice';
        button.textContent = `${String.fromCharCode(65 + index)} ${choice}`;
        button.setAttribute('aria-pressed', 'false');
        button.addEventListener('click', () => {
          document.querySelectorAll('.choice').forEach((peer) => {
            const selected = peer === button;
            peer.classList.toggle('selected', selected);
            peer.setAttribute('aria-pressed', String(selected));
          });
        });
        $('choices').appendChild(button);
      });

      $('explanation').hidden = !revealed;
      $('recommendation').textContent = data.recommendation;
      $('reason').textContent = data.reason;
      $('reversal').textContent = data.reversal;
      $('reveal').textContent = revealed ? '收起解析' : '查看解析';
      $('prev').disabled = current === 0;
      $('next').disabled = current === cases.length - 1;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    $('prev').addEventListener('click', () => {
      if (current > 0) { current -= 1; revealed = false; render(); }
    });

    $('next').addEventListener('click', () => {
      if (current < cases.length - 1) { current += 1; revealed = false; render(); }
    });

    $('reveal').addEventListener('click', () => { revealed = !revealed; render(); });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }

    render();
  </script>
